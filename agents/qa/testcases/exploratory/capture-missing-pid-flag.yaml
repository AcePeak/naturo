preconditions:
  - "naturo is installed and in PATH"
  - "At least one app is running"

steps:
  - description: "Get a PID from list apps"
    command: "naturo list apps -j | python -c \"import json,sys; d=json.load(sys.stdin); print(d[0]['pid'] if isinstance(d,list) else list(d.values())[0][0]['pid'])\""
    expect: "A valid PID is returned"
  - description: "Try capture --pid"
    command: "naturo capture --pid <PID> -o /tmp/tc-0022.png"
    expect: "Should capture the window for that PID, or at minimum list --pid as a valid option"
  - description: "Verify see supports --pid"
    command: "naturo see --pid <PID>"
    expect: "Returns element tree for that PID (confirming --pid works on other commands)"

