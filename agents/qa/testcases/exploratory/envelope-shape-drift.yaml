id: TC-0071
title: "JSON error envelope shape drifts across CLI commands — app * has 6 fields, see/capture/list/type/press/click/find have 3, get/set have 2"
status: active
category: exploratory
priority: P2
source_issue: 884
created: 2026-05-28
last_run: 2026-05-28
last_result: fail
consecutive_passes: 0
notes: "R134: FAIL — confirmed see=3, app launch=6, get=2. NEW shape D found this round: record show/delete/export/play -j return error as plain STRING, not object. Worse than A/B/C since .error.code is undefined. Added as comment on #884."

preconditions:
  - "naturo is installed and in PATH"
  - "Any error condition that can be triggered without a desktop (e.g. NO_DESKTOP_SESSION or stale eN ref)"

steps:
  - description: "see -j error shape"
    command: "naturo see -j 2>&1 | python -c \"import sys,json; print(sorted(json.load(sys.stdin)['error'].keys()))\""
    expect: "['category','code','context','message','recoverable','suggested_action'] — the canonical 6-field shape from NaturoError.to_json_response()"
  - description: "app launch -j error shape"
    command: "naturo app launch notepad -j 2>&1 | python -c \"import sys,json; print(sorted(json.load(sys.stdin)['error'].keys()))\""
    expect: "Same 6-field shape as above"
  - description: "get e1 -j error shape (stale snapshot ref)"
    command: "naturo get e1 -j 2>&1 | python -c \"import sys,json; print(sorted(json.load(sys.stdin)['error'].keys()))\""
    expect: "Same 6-field shape — even for UNKNOWN_ERROR codes, the envelope should be uniform"

pass_criteria: "All three commands return the same `error` keyset (canonical 6 fields). PASS when fix lands."
fail_action: "Verify #884 is still open; if closed, retire test case."
