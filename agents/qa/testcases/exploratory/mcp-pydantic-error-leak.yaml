id: TC-0051
title: "MCP tool call with wrong param name leaks Pydantic internals in error response"
status: active
category: exploratory
priority: P2
source_issue: null
created: 2026-04-05
last_run: 2026-04-05
last_result: fail
consecutive_passes: 0
notes: "2026-04-05 R115: FAIL — launch_app with {app_name: notepad} returns Pydantic validation error with class name 'launch_appArguments' and pydantic URL."

preconditions:
  - "naturo is installed and in PATH"

steps:
  - description: "Send MCP tool call with incorrect parameter name"
    command: "printf '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"test\",\"version\":\"1.0\"}}}\\n{\"jsonrpc\":\"2.0\",\"method\":\"notifications/initialized\"}\\n{\"jsonrpc\":\"2.0\",\"id\":5,\"method\":\"tools/call\",\"params\":{\"name\":\"launch_app\",\"arguments\":{\"app_name\":\"notepad\"}}}\\n' | timeout 10 naturo mcp start 2>/dev/null"
    expect: "Error response should say 'parameter name is required' in plain language, not Pydantic internals"
  - description: "Verify error contains Pydantic leak"
    command: "Check output for 'launch_appArguments', 'pydantic.dev', 'type=missing'"
    expect: "These internal details should NOT appear in user-facing error messages"

pass_criteria: "MCP validation errors use clear, user-friendly messages without leaking Pydantic class names or URLs"
fail_action: "File P2 issue: MCP tool errors expose Pydantic internals, confusing agent builders"
