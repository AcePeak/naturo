notes: "2026-04-01 R74: FAIL — MCP see_ui_tree(window_title='文件资源管理器') returns success:true, elements:0. CLI naturo see --app 文件资源管理器 returns 178 elements. Discovered during: AI Agent Builder simulation."

preconditions:
  - "naturo is installed and in PATH"
  - "File Explorer (文件资源管理器) is open"

