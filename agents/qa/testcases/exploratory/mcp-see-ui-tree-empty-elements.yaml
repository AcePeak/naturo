  - description: "Start MCP server and call see_ui_tree with same window"
    command: "Send initialize + see_ui_tree(window_title='文件资源管理器') via MCP stdio"
    expect: "Response contains success:true AND elements array with >0 items"
  - description: "Parse MCP response"
    command: "Validate inner JSON, check elements count"
    expect: "Element count matches CLI output (or at least >0)"

pass_criteria: "MCP see_ui_tree returns the same elements as CLI naturo see for the same window"
