id: TC-0060
title: "MCP serverInfo.version reports MCP SDK version instead of naturo version (#873)"
status: active
category: exploratory
priority: P2
source_issue: 873
created: 2026-05-28
last_run: 2026-05-28
last_result: fail
consecutive_passes: 0
notes: "R130: FAIL — MCP serverInfo.version reports `1.26.0` (MCP SDK) instead of naturo `0.3.1`. #873 unchanged."

preconditions:
  - "naturo is installed and in PATH"
  - "mcp Python package is installed (any version)"

steps:
  - description: "Record naturo's own version"
    command: "naturo --version"
    expect: "naturo, version <CLI_VERSION>"
  - description: "Record mcp SDK version"
    command: "pip show mcp 2>&1 | grep ^Version"
    expect: "Version: <SDK_VERSION> (e.g. 1.26.0)"
  - description: "Handshake and check serverInfo"
    command: |
      (echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"qa","version":"1"}}}'
       echo '{"jsonrpc":"2.0","method":"notifications/initialized"}'
       sleep 1
      ) | timeout 5 naturo mcp start --transport stdio 2>/dev/null | head -1
    expect: "serverInfo.version equals naturo's own version (CLI_VERSION). Currently equals SDK_VERSION (FAIL)."

pass_criteria: "serverInfo.version returned by MCP initialize matches `naturo --version`, not the mcp SDK's own __version__"
fail_action: "Update #873; verify FastMCP/Server() constructor is passed version=naturo.__version__"
