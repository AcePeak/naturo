id: TC-0081
title: "naturo wait success envelope drifts across duration vs predicate sub-modes"
status: active
category: exploratory
priority: P2
source_issue: 895
created: 2026-05-28
last_run: 2026-05-28
consecutive_passes: 0

preconditions:
  - "naturo is installed and in PATH"
  - "Runnable from NO_DESKTOP_SESSION — duration mode and --gone bypass do not require desktop bind"

steps:
  - description: "Run wait in duration mode and capture envelope keys"
    command: 'naturo wait 0.1 -j'
    expect: |
      Returns {success:true, mode:"duration", wait_time:0.1}.
      Key set: {success, mode, wait_time} — no found, no warnings.
  - description: "Run wait --gone (predicate sub-mode) and capture envelope keys"
    command: 'naturo wait --gone xyz -j'
    expect: |
      Returns {success:true, found:true, wait_time:0.0, warnings:[]} (currently bypasses NO_DESKTOP per #893).
      Key set: {success, found, wait_time, warnings} — no mode discriminator.
  - description: "Run wait --window (predicate sub-mode) and capture envelope keys"
    command: 'naturo wait --window xyz --timeout 1 -j'
    expect: |
      Returns {success:false, found:false, wait_time:1.0, warnings:[]} (timed out).
      Key set identical to --gone — no mode discriminator.
  - description: "Run wait --element (predicate sub-mode) and capture envelope keys"
    command: 'naturo wait --element "Button:Save" --timeout 1 -j'
    expect: |
      Returns {success:false, found:false, wait_time:1.0, warnings:[]}.
      Key set identical to other predicate sub-modes.

pass_criteria: |
  All four sub-modes return the SAME envelope shape, OR a consistent `mode` discriminator
  field is present in every sub-mode (e.g. mode:"duration"|"gone"|"window"|"element").
  A consumer should not need to know the invocation arguments to parse the response.
fail_action: "File P2 contract-drift issue under v0.3.4, link to envelope-drift cluster (#864–#884)"
