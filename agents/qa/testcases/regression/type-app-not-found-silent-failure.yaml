id: TC-0013
title: "type --app reports 'App not found' but exits 0 and types to foreground window (silent failure)"
status: retired
category: regression
priority: P1
source_issue: 474
created: 2026-03-28
last_run: 2026-03-29
last_result: pass
consecutive_passes: 5
notes: "2026-03-29 R56: PASS — type --app nonexistent123 returns exit 1. 5 consecutive passes + #474 closed → RETIRED."

preconditions:
  - "naturo is installed and in PATH"
  - "Notepad is running"

steps:
  - description: "Type with Chinese alias that see resolves but type does not"
    command: "naturo type --app 记事本 'test_silent'; echo EXIT=$?"
    expect: "Either: (a) type succeeds and targets Notepad, or (b) type fails with non-zero exit code"
  - description: "Check if text went to Notepad or foreground window"
    command: "naturo capture --app notepad -o /tmp/tc-0013.png"
    expect: "If type reported success, text should be visible in Notepad"

pass_criteria: "type --app must either resolve the alias and target the correct app, or fail with non-zero exit code. Never type to the wrong window with exit code 0."
fail_action: "File GitHub issue for silent failure in type --app"
