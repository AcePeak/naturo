id: TC-0001
title: "naturo type produces wrong text on Chinese IME Windows"
status: active
category: regression
priority: P0
source_issue: 425
created: 2026-03-27
last_run: 2026-03-27
consecutive_passes: 0

preconditions:
  - "naturo is installed and in PATH"
  - "Notepad is available"
  - "Windows with Chinese IME configured"

steps:
  - description: "Launch Notepad"
    command: "naturo app launch notepad"
    expect: "Notepad opens successfully"
  - description: "Click the text area"
    command: "naturo see --app notepad"
    expect: "Element tree shows text editing area"
  - description: "Type English text"
    command: "naturo type --app notepad \"hello world\""
    expect: "Text 'hello world' appears in Notepad editor"
  - description: "Screenshot verify typed text"
    command: "naturo capture --app notepad -o /tmp/tc-0001-type.png"
    expect: "Screenshot shows 'hello world' in the editor, not garbled text"
  - description: "Clean up"
    command: "naturo app quit notepad"
    expect: "Notepad closes"

pass_criteria: "Typed text matches exactly what was sent, confirmed by screenshot"
fail_action: "Update issue #425 with failure details"
