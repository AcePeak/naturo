id: TC-0021
title: "naturo type treats \\t and \\n as literal text instead of tab/newline characters"
status: active
category: regression
priority: P1
source_issue: 563
created: 2026-03-29
last_run: 2026-03-29
last_result: pass
consecutive_passes: 4
notes: "2026-03-29 R65: PASS — type 'Col1\\tCol2\\tCol3' produces tab-separated columns visible in Notepad screenshot."

preconditions:
  - "naturo is installed and in PATH"
  - "Notepad is available"

steps:
  - description: "Launch Notepad"
    command: "naturo app launch notepad"
    expect: "Notepad opens"
  - description: "Type text with \\t escape sequences"
    command: "naturo type 'Column1\\tColumn2\\tColumn3' --app notepad"
    expect: "Text appears with actual tab characters between columns, NOT literal \\t"
  - description: "Screenshot verify"
    command: "naturo capture --app notepad -o /tmp/tc-0021.png"
    expect: "Screenshot shows tab-separated columns, not literal backslash-t"
  - description: "Cleanup"
    command: "naturo app quit notepad"
    expect: "Notepad closes"

pass_criteria: "naturo type interprets \\t as tab and \\n as newline in typed text"
fail_action: "File P1 issue: type command should support escape sequences for RPA data entry"
